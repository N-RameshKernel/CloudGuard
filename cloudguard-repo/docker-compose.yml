version: '3.8'

services:
  cloudguard:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudguard:latest
    container_name: cloudguard-dashboard
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.cloudguard.version=1.0.0"
      - "com.cloudguard.maintainer=N. Ramesh"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

